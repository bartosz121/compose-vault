# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: compose-vault

before:
  hooks:
    - go mod tidy

builds:
  - binary: compose-vault
    main: ./cmd
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X "main.version={{ .Tag }}"
    goos:
      - linux
      - windows
      - darwin

archives:
  - formats: [tar.gz]
    files:
      - README.md
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
